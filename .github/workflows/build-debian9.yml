name: Debian9 Build Job

on: [push, pull_request]

jobs:
  build:
    name: Build on Debian9
    runs-on: ubuntu-latest

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Build LTFS
        id: build
        run: |
          docker run --rm -v "$PWD":/work -w /work debian:stretch /bin/bash -lc "
            set -e
            printf '%s\n' \
              'deb [trusted=yes] http://archive.debian.org/debian stretch main' \
              'deb [trusted=yes] http://archive.debian.org/debian stretch-updates main' \
              'deb [trusted=yes] http://archive.debian.org/debian-security stretch/updates main' > /etc/apt/sources.list
            printf '%s\n' \
              'Acquire::Check-Valid-Until \"false\";' \
              'Acquire::AllowInsecureRepositories \"true\";' > /etc/apt/apt.conf.d/99archive
            apt-get -o Acquire::Check-Valid-Until=false update
            DEBIAN_FRONTEND=noninteractive apt-get -q -y install \
              build-essential automake autoconf libtool pkg-config \
              icu-devtools libicu-dev libxml2-dev uuid-dev fuse libfuse-dev libsnmp-dev
            ./autogen.sh
            ./configure
            make -j\$(nproc)
          "
