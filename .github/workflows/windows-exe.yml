name: Windows EXE
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ltfs_gui.py
      - packaging/appimage/requirements.txt
      - packaging/windows/ltfs-gui.ico
      - .github/workflows/windows-exe.yml
  pull_request:
    branches:
      - master
    paths:
      - ltfs_gui.py
      - packaging/appimage/requirements.txt
      - packaging/windows/ltfs-gui.ico
      - .github/workflows/windows-exe.yml
jobs:
  build-windows-exe:
    name: Build Windows EXE (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packaging/appimage/requirements.txt
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip==24.3.1 setuptools==75.6.0 wheel==0.45.1
          python -m pip install --upgrade --requirement packaging/appimage/requirements.txt
      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --name ltfs-gui `
            --onefile `
            --windowed `
            --icon "${{ github.workspace }}/packaging/windows/ltfs-gui.ico" `
            --distpath dist `
            --workpath build/windows/pyinstaller/build `
            --specpath build/windows/pyinstaller `
            ltfs_gui.py
      - name: Smoke validate executable
        shell: pwsh
        run: |
          if (!(Test-Path "dist/ltfs-gui.exe")) {
            throw "Expected dist/ltfs-gui.exe to exist"
          }
          $exeSize = (Get-Item "dist/ltfs-gui.exe").Length
          if ($exeSize -lt 1048576) {
            throw "Windows executable appears too small ($exeSize bytes)"
          }
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ltfs-manager-windows-exe-py${{ matrix.python-version }}
          path: dist/ltfs-gui.exe
