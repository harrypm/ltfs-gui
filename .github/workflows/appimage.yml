name: AppImage
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ltfs_gui.py
      - ltfs-gui.desktop
      - scripts/build-appimage.sh
      - packaging/appimage/**
      - vendor/appimagetool/**
      - .github/workflows/appimage.yml
  pull_request:
    branches:
      - master
    paths:
      - ltfs_gui.py
      - ltfs-gui.desktop
      - scripts/build-appimage.sh
      - packaging/appimage/**
      - vendor/appimagetool/**
      - .github/workflows/appimage.yml
jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install AppImage prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-venv python3-pip python3-tk \
            libfuse2 desktop-file-utils
      - name: Resolve pip cache directory
        id: pip-cache
        run: echo "dir=$(python3 -m pip cache dir)" >> "$GITHUB_OUTPUT"
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-appimage-pip-${{ hashFiles('packaging/appimage/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-appimage-pip-
      - name: Cache appimagetool binary
        uses: actions/cache@v4
        with:
          path: .cache/appimagetool
          key: ${{ runner.os }}-appimagetool-${{ hashFiles('vendor/appimagetool/SHA256SUMS') }}
      - name: Build AppImage artifact
        env:
          APPIMAGETOOL_BIN: ${{ github.workspace }}/.cache/appimagetool/appimagetool-x86_64.AppImage
        run: |
          mkdir -p .cache/appimagetool
          bash scripts/build-appimage.sh
      - name: Smoke validate AppImage
        run: |
          shopt -s nullglob
          appimages=(dist/*.AppImage)
          if [ "${#appimages[@]}" -eq 0 ]; then
            echo "No AppImage output found under dist/"
            exit 1
          fi
          appimage="${appimages[0]}"
          test -x "${appimage}"
          "${appimage}" --appimage-version
          rm -rf squashfs-root
          "${appimage}" --appimage-extract >/dev/null
          test -f squashfs-root/AppRun
          test -f squashfs-root/ltfs-gui.desktop
          test -f squashfs-root/ltfs-gui.png
          test -f squashfs-root/usr/lib/libfuse.so.2
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ltfs-manager-appimage
          path: dist/*.AppImage
